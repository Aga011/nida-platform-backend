
services:

  postgres:
    image: postgres:17
    container_name: nida-postgres
    environment:
      POSTGRES_DB: nida
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nida-network

  redis:
    image: redis:7-alpine
    container_name: nida-redis
    ports:
      - "6379:6379"
    networks:
      - nida-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: nida-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - nida-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: nida-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - nida-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: nida-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    networks:
      - nida-network

networks:
  nida-network:
    driver: bridge

volumes:
  postgres-data: